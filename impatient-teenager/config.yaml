## Integration with Emotion Engine

```bash
# Example: Run emotion engine with Alex persona
emotion-engine evaluate \
  --persona impatient-teenager \
  --input video.mp4 \
  --output alex-reaction.json \
  --include-video
```

**Output Includes:**
- Emotion timeline (second-by-second reactions)
- Scroll risk score (likelihood of abandoning at each moment)
- Key moments (hook success/failure, pattern interrupts)
- Final verdict (watch-to-end probability)
- Optional: Generated reaction video clip

